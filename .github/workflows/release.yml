name: Build native installers

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            installer-type: deb
          - os: windows-latest
            installer-type: msi
          - os: macos-latest
            installer-type: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Linux installer dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Windows installer dependencies
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset -y

      - name: Compile
        run: javac -d build/classes src/SuperMarket.java src/Product.java src/Cart.java

      - name: Package jar
        run: jar --create --file build/jar/SuperMarket.jar --main-class SuperMarket -C build/classes .

      - name: Derive version from tag
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build installer
        shell: bash
        run: |
          jpackage \
            --input build/jar \
            --name SuperMarketCLI \
            --main-jar SuperMarket.jar \
            --main-class SuperMarket \
            --type ${{ matrix.installer-type }} \
            --app-version "$APP_VERSION" \
            --vendor "DJTheron" \
            --dest build/dist

      - uses: actions/upload-artifact@v4
        with:
          name: SuperMarketCLI-${{ matrix.os }}
          path: build/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build/dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/*
          generate_release_notes: true
